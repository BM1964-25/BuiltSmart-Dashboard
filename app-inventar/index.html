<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App-Inventar – Technische Bausteine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0B1D35;--navy2:#1E3A5F;--gold:#C9A84C;--gold2:#E8C97A;
  --cream:#F8F5EE;--cream2:#EDE9DF;--white:#FFFFFF;--muted:#5A6A7E;
  --border:rgba(11,29,53,.10);--border2:rgba(11,29,53,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--navy);-webkit-font-smoothing:antialiased;}

/* HEADER */
.page-header{background:var(--navy);padding:40px 48px 44px;position:relative;overflow:hidden;}
.page-header::after{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:rgba(201,168,76,.07);}
.header-badge{display:inline-block;background:rgba(201,168,76,.2);color:var(--gold2);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:14px;}
.page-header h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;margin-bottom:6px;}
.page-header p{font-size:13px;color:rgba(255,255,255,.55);max-width:580px;line-height:1.65;}

/* TOOLBAR */
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 48px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100;min-height:56px;}
.toolbar-back{font-size:12.5px;font-weight:500;color:var(--gold);text-decoration:none;display:flex;align-items:center;gap:5px;padding:8px 0;white-space:nowrap;border-right:1px solid var(--border);padding-right:16px;margin-right:4px;}
.toolbar-back svg{width:13px;height:13px;}
.search-box{position:relative;flex:1;min-width:180px;max-width:280px;}
.search-box input{width:100%;border:1px solid var(--border2);border-radius:8px;padding:7px 10px 7px 32px;font-size:12.5px;font-family:'Inter',sans-serif;background:var(--cream);color:var(--navy);outline:none;transition:border-color .15s;}
.search-box input:focus{border-color:var(--gold);}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;}
.sort-btn{font-size:12px;font-weight:500;padding:6px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--cream);color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.sort-btn.active,.sort-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.sort-btn svg{width:12px;height:12px;}
.app-filter{display:flex;align-items:center;gap:6px;margin-left:auto;}
.app-chip{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--cream);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.app-chip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.result-count{font-size:11.5px;color:var(--muted);margin-left:8px;white-space:nowrap;}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:32px 48px 80px;}

/* CATEGORY SECTION */
.cat-section{margin-bottom:36px;}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.cat-stripe{width:3px;height:18px;border-radius:2px;flex-shrink:0;}
.cat-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--navy);}
.cat-divider{flex:1;height:1px;background:var(--border);}
.cat-count{font-size:11px;color:var(--muted);background:var(--cream2);border-radius:20px;padding:2px 9px;font-weight:500;}

/* ITEM GRID */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:10px;}
.item-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:start;transition:border-color .15s,box-shadow .15s;}
.item-card:hover{border-color:var(--border2);box-shadow:0 3px 12px rgba(11,29,53,.07);}
.item-name{font-size:12.5px;font-weight:600;color:var(--navy);line-height:1.3;word-break:break-word;}
.item-app{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:3px;padding:2px 7px;border-radius:5px;display:inline-block;}
.item-desc{font-size:12px;color:var(--muted);line-height:1.55;}

/* CAT COLORS */
.c1{background:rgba(23,85,166,.1);color:#1755A6;}
.c2{background:rgba(184,75,47,.1);color:#B84B2F;}
.c3{background:rgba(26,127,90,.1);color:#1A7F5A;}
.c4{background:rgba(107,63,160,.1);color:#6B3FA0;}
.c5{background:rgba(201,168,76,.12);color:#8A620A;}
.c6{background:rgba(92,63,163,.1);color:#5C3FA3;}
.c7{background:rgba(158,47,110,.1);color:#9E2F6E;}
.c8{background:rgba(46,125,110,.1);color:#2E7D6E;}
.c9{background:rgba(30,58,95,.1);color:#1E3A5F;}
.c10{background:rgba(11,29,53,.08);color:#5A6A7E;}
.c11{background:rgba(184,75,47,.08);color:#8B3020;}
.c12{background:rgba(23,85,166,.08);color:#0F3D7A;}

.stripe1{background:#1755A6;} .stripe2{background:#B84B2F;} .stripe3{background:#1A7F5A;}
.stripe4{background:#6B3FA0;} .stripe5{background:#C9A84C;} .stripe6{background:#5C3FA3;}
.stripe7{background:#9E2F6E;} .stripe8{background:#2E7D6E;} .stripe9{background:#1E3A5F;}
.stripe10{background:#5A6A7E;} .stripe11{background:#8B3020;} .stripe12{background:#0F3D7A;}

/* EMPTY */
.empty{padding:60px;text-align:center;color:var(--muted);font-size:14px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<div class="page-header">
  <div class="header-badge">BuiltSmart AI · Technische Dokumentation</div>
  <h1>App-Inventar – Technische Bausteine</h1>
  <p>Alle verbauten Tools, APIs und Funktionen je App. Filterbar nach App und Kategorie, sortierbar nach Name oder Kategorie.</p>
</div>

<div class="toolbar">
  <a href="https://bm1964-25.github.io/BuiltSmart-Dashboard/" class="toolbar-back">
    <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 2H11V5"/><path d="M11 2L6 7"/><path d="M5 3H2V11H10V8"/></svg>
    Dashboard
  </a>
  <div class="search-box">
    <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
    <input type="text" id="searchInput" placeholder="Suchen …" oninput="render()">
  </div>
  <button class="sort-btn" id="sortCat" onclick="setSort('cat')" title="Nach Kategorie sortieren">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="2" y1="4" x2="12" y2="4"/><line x1="2" y1="7" x2="9" y2="7"/><line x1="2" y1="10" x2="6" y2="10"/></svg>

  </button>

    A–Z
  </button>
  <div class="app-filter" id="appFilter"></div>
  <span class="result-count" id="resultCount"></span>
</div>

<div class="content" id="mainContent"></div>

// ── STATE ──────────────────────────────────────────────────
let sortMode = 'az';       // 'az' | 'cat'
let activeApp = 'all';

function catObj(id){ return CATS.find(c=>c.id===id)||{label:'',stripe:'stripe1'}; }

// ── APP FILTER CHIPS ────────────────────────────────────────
function buildAppFilter(){
  const el = document.getElementById('appFilter');
  let h = `<button class="app-chip active" data-app="all" onclick="setApp('all',this)">Alle Apps</button>`;
  APPS.forEach(a => h += `<button class="app-chip" data-app="${a}" onclick="setApp('${a}',this)">${a}</button>`);
  el.innerHTML = h;
}
function setApp(app, btn){
  activeApp = app;
  document.querySelectorAll('.app-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSort(mode){
  sortMode = mode;
  document.getElementById('sortAz').classList.toggle('active', mode==='az');
  document.getElementById('sortCat').classList.toggle('active', mode==='cat');
  render();
}

// ── RENDER ──────────────────────────────────────────────────
function render(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let items = ITEMS.filter(i => {
    if(activeApp !== 'all' && i.app !== activeApp) return false;
    if(!q) return true;
    return i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q) || catObj(i.cat).label.toLowerCase().includes(q);
  });

  document.getElementById('resultCount').textContent = items.length + ' Einträge';
  const container = document.getElementById('mainContent');

  if(!items.length){
    container.innerHTML = '<div class="empty">Keine Treffer für diese Auswahl.</div>';
    return;
  }

  if(sortMode === 'az'){
    // Alphabetisch — eine einzige A–Z Sektion
    items.sort((a,b)=>a.name.localeCompare(b.name,'de'));
    container.innerHTML = `<div class="item-grid">${items.map(card).join('')}</div>`;
  } else {
    // Nach Kategorie gruppiert
    const grouped = {};
    items.forEach(i => { if(!grouped[i.cat]) grouped[i.cat]=[]; grouped[i.cat].push(i); });
    // Preserve category order
    let html = '';
    CATS.forEach(cat => {
      const grp = grouped[cat.id];
      if(!grp) return;
      grp.sort((a,b)=>a.name.localeCompare(b.name,'de'));
      html += `
        <div class="cat-section">
          <div class="cat-header">
            <span class="cat-stripe ${cat.stripe}"></span>
            <span class="cat-title">${cat.label}</span>
            <span class="cat-divider"></span>
            <span class="cat-count">${grp.length}</span>
          </div>
          <div class="item-grid">${grp.map(card).join('')}</div>
        </div>`;
    });
    container.innerHTML = html;
  }
}

function card(i){
  const cat = catObj(i.cat);
  const appColor = i.app === 'SMART ReplySuite' ? 'c7' : i.app === 'SMART SnippetFlow' ? 'c8' : 'c1';
  return `<div class="item-card">
    <div>
      <div class="item-name">${i.name}</div>
      <span class="item-app ${appColor}">${i.app.replace('SMART RISK ','')}</span>
    </div>
    <div class="item-desc">${i.desc}</div>
  </div>`;
}

buildAppFilter();
render();
</script>
